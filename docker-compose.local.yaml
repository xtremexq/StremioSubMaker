# Local development setup without Redis (uses filesystem storage)
#
# If using `user: PUID:PGID` to run as a custom UID, ensure the host
# bind-mount directories are owned by that user:
#   chown -R <PUID>:<PGID> ./data ./.cache ./logs ./keys
#
services:
  submaker:
    # Use pre-built image from Docker Hub (recommended)
    # image: xtremexq/submaker:latest
    # Or build locally
    build: .
    container_name: submaker-local
    ports:
      - "${PORT:-7001}:7001"
    # Load ALL environment variables from .env file
    env_file:
      - .env
    environment:
      # Override specific variables for local development
      # Storage configuration - force filesystem for local use (runtime default is redis)
      - STORAGE_TYPE=filesystem

      # Encryption key file path (persisted in bind mount)
      - ENCRYPTION_KEY_FILE=/app/keys/.encryption-key

    volumes:
      # Persist cache and data directories
      # NOTE: These bind-mount directories must be writable by the user running
      # the container. If using `user: PUID:PGID`, run:
      #   chown -R <PUID>:<PGID> ./data ./.cache ./logs ./keys
      - ./data:/app/data
      - ./.cache:/app/.cache
      - ./logs:/app/logs
      - ./keys:/app/keys
    restart: unless-stopped
