# Local development setup without Redis (uses filesystem storage)
#
# The entrypoint starts as root, creates bind-mount directories, sets
# ownership to PUID:PGID (default 1000:1000), then drops to that user.
# No manual chown required — everything works out of the box.
#
services:
  submaker:
    # Use pre-built image from Docker Hub (recommended)
    # image: xtremexq/submaker:latest
    # Or build locally
    build: .
    container_name: submaker-local
    ports:
      - "${PORT:-7001}:7001"
    # Load ALL environment variables from .env file
    # Optional: set TZ in .env (for example TZ=Europe/Berlin) to localize log timestamps.
    # Leave TZ unset to preserve the existing UTC log format.
    env_file:
      - .env
    environment:
      # Override specific variables for local development
      # Storage configuration - force filesystem for local use (runtime default is redis)
      - STORAGE_TYPE=filesystem

      # Encryption key file path (persisted in bind mount)
      - ENCRYPTION_KEY_FILE=/app/keys/.encryption-key

      # Custom UID/GID for the application process (default: 1000 = node user)
      # The entrypoint runs as root, chowns data dirs to PUID:PGID, then
      # drops privileges via su-exec. No need for `user:` in compose.
      # - PUID=1000
      # - PGID=1000
    volumes:
      # Persist cache and data directories
      - ./data:/app/data
      - ./.cache:/app/.cache
      - ./logs:/app/logs
      - ./keys:/app/keys
    restart: unless-stopped
