<!DOCTYPE html>
<html lang="en" data-third-theme="blackhole">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-i18n="config.documentTitle">SubMaker - Configure</title>
    <meta name="description"
        content="SubMaker — AI-Powered Subtitle Translation for Stremio. Configure your addon settings.">

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg?_cb=1.4.16">
    <link rel="apple-touch-icon" href="/favicon.svg?_cb=1.4.16">

    <!-- Flash-of-unstyled-theme prevention -->
    <script>
        (function () {
            var html = document.documentElement;
            var thirdTheme = html.getAttribute('data-third-theme') === 'true-dark' ? 'true-dark' : 'blackhole';
            var theme = 'dark'; // V2 defaults to dark
            var saved = null;
            try { saved = localStorage.getItem('theme'); } catch (_) { }
            if (saved === 'blackhole' || saved === 'true-dark') {
                theme = thirdTheme;
            } else if (saved === 'light' || saved === 'dark') {
                theme = saved;
            } else if (window.matchMedia && window.matchMedia('(prefers-color-scheme: light)').matches) {
                theme = 'light';
            }
            html.setAttribute('data-theme', theme);
        })();
    </script>

    <!-- Fonts: Pixel + Modern -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&family=Press+Start+2P&display=swap"
        rel="stylesheet">

    <!-- V2 Styles (3 parts) -->
    <link rel="stylesheet" href="/css/configure-v2-part1.css?_cb=1.4.16">
    <link rel="stylesheet" href="/css/configure-v2-part2.css?_cb=1.4.16">
    <link rel="stylesheet" href="/css/configure-v2-part3.css?_cb=1.4.16">
    <link rel="stylesheet" href="/css/configure-v2-compat.css?_cb=1.4.16">

    <!-- Existing styles needed for overlays/quick-setup -->
    <link rel="stylesheet" href="/css/combobox.css?_cb=1.4.16">
    <link rel="stylesheet" href="/css/quick-setup.css?_cb=1.4.16">
</head>

<body class="v2">
    <!-- Theme Toggle Button (existing, re-styled by v2 CSS) -->
    <button class="theme-toggle mario" id="themeToggle" aria-label="Toggle theme" data-i18n="fileUpload.themeToggle"
        data-i18n-attr="aria-label">
        <span class="theme-toggle-icon sun" aria-hidden="true">
            <svg viewBox="0 0 64 64" width="28" height="28" role="img">
                <defs>
                    <radialGradient id="gSun" cx="50%" cy="50%" r="60%">
                        <stop offset="0%" stop-color="#fff4b0" />
                        <stop offset="60%" stop-color="#f7d13e" />
                        <stop offset="100%" stop-color="#e0a81e" />
                    </radialGradient>
                </defs>
                <g fill="none" stroke="#8a5a00" stroke-linecap="round">
                    <circle cx="32" cy="32" r="13" fill="url(#gSun)" stroke-width="3" />
                    <g stroke-width="3">
                        <line x1="32" y1="6" x2="32" y2="14" />
                        <line x1="32" y1="50" x2="32" y2="58" />
                        <line x1="6" y1="32" x2="14" y2="32" />
                        <line x1="50" y1="32" x2="58" y2="32" />
                        <line x1="13" y1="13" x2="19" y2="19" />
                        <line x1="45" y1="45" x2="51" y2="51" />
                        <line x1="13" y1="51" x2="19" y2="45" />
                        <line x1="45" y1="19" x2="51" y2="13" />
                    </g>
                </g>
            </svg>
        </span>
        <span class="theme-toggle-icon moon" aria-hidden="true">
            <svg viewBox="0 0 64 64" width="28" height="28" role="img">
                <defs>
                    <radialGradient id="gMoon" cx="40%" cy="35%" r="65%">
                        <stop offset="0%" stop-color="#fff7cc" />
                        <stop offset="70%" stop-color="#f1c93b" />
                        <stop offset="100%" stop-color="#d19b16" />
                    </radialGradient>
                    <mask id="mMoon">
                        <rect width="100%" height="100%" fill="#ffffff" />
                        <circle cx="44" cy="22" r="18" fill="#000000" />
                    </mask>
                </defs>
                <g fill="none" stroke="#8a5a00">
                    <circle cx="32" cy="32" r="22" fill="url(#gMoon)" stroke-width="3" mask="url(#mMoon)" />
                </g>
            </svg>
        </span>
        <span class="theme-toggle-icon blackhole" aria-hidden="true">
            <svg viewBox="0 0 64 64" width="28" height="28" role="img">
                <defs>
                    <radialGradient id="gRing" cx="50%" cy="50%" r="50%">
                        <stop offset="0%" stop-color="#6b65ff" />
                        <stop offset="60%" stop-color="#4b2ed6" />
                        <stop offset="100%" stop-color="#1a103a" />
                    </radialGradient>
                </defs>
                <circle cx="32" cy="32" r="12" fill="#000" />
                <circle cx="32" cy="32" r="20" fill="none" stroke="url(#gRing)" stroke-width="6" />
            </svg>
        </span>
    </button>

    <!-- V2 Main Content -->
    <div data-include="/partials/main-v2.html"></div>

    <!-- Overlays (re-using existing) -->
    <div data-include="/partials/overlays.html"></div>
    <div data-include="/partials/quick-setup.html"></div>

    <!-- Existing Scripts (same IDs = same JS works) -->
    <script src="/js/init.js?_cb=1.4.16" defer></script>
    <script src="/js/combobox.js?_cb=1.4.16" defer></script>
    <script src="/js/combobox-init.js?_cb=1.4.16" defer></script>
    <script src="/js/config-loader.js?_cb=1.4.16" defer></script>
    <script src="/js/ui-widgets.js?_cb=1.4.16" defer></script>
    <script src="/js/theme-toggle.js?_cb=1.4.16" defer></script>
    <script src="/js/help-modal.js?_cb=1.4.16" defer></script>
    <script src="/js/sw-register.js?_cb=1.4.16" defer></script>
    <script src="/js/quick-setup.js?_cb=1.4.16" defer></script>

    <!-- V2 Panel Navigation (new) -->
    <script src="/js/panel-nav.js?_cb=1.4.16" defer></script>

    <!-- V2 Visual Effects Engine (new) -->
    <script src="/js/v2-effects.js?_cb=1.4.16" defer></script>

    <!-- V2 Instructions Modal Override (new) -->
    <script src="/js/v2-instructions.js?_cb=1.4.16" defer></script>
</body>

</html>
